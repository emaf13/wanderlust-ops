apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: wanderlust
data:
  MONGODB_URI: "mongodb://mongo-service:27017/wanderlust"
  REDIS_URL: "redis://redis-service:6379"
  PORT: "8080"
  FRONTEND_URL: "http://localhost:3000"  # ← CAMBIADO (para port-forward)
  ACCESS_COOKIE_MAXAGE: "120000"
  ACCESS_TOKEN_EXPIRES_IN: "120s"
  REFRESH_COOKIE_MAXAGE: "120000"
  REFRESH_TOKEN_EXPIRES_IN: "120s"
  NODE_ENV: "production"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: wanderlust
data:
  VITE_API_PATH: "http://localhost:3001"  # ← CAMBIADO (para port-forward)
